url: https://pcstrategyandopsco.github.io/brightspaceR/

template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/pcstrategyandopsco/brightspaceR

articles:
  - title: Get Started
    navbar: ~
    contents:
      - setup
      - getting-started
  - title: Working with Data
    contents:
